<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliPlanner – Workspace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="workspace-header">
        <nav class="main-nav">
            <a href="/" class="logo">Ali's Workspace</a>
            <div class="search-bar">
                <input type="search" placeholder="Поиск" aria-label="Поиск">
                <kbd>Ctrl K</kbd>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="workspace-main">
        <aside class="sidebar">
            <ul>
                <li><a href="/home">🏠 Главная</a></li>
                <li><a href="/inbox">📬 Входящие <span class="badge">0</span></a></li>
                <li><a href="/settings">⚙️ Настройки</a></li>
            </ul>
        </aside>

        <section class="content-area">
            <!-- Login Form -->
            <form class="login-form" action="/api/login" method="POST">
                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">ПАРОЛЬ</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Войти</button>
            </form>

            <!-- Registration Form -->
            <form class="register-form" action="/api/register" method="POST">
                <div class="form-group">
                    <label for="reg-name">ИМЯ</label>
                    <input type="text" id="reg-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">EMAIL</label>
                    <input type="email" id="reg-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">ПАРОЛЬ</label>
                    <input type="password" id="reg-password" name="password" required>
                </div>
                <button type="submit">Создать аккаунт</button>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
